<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISEMINASI MILENIAL - King Mamank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', Times, serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; }
        
        /* Preview Kertas A4 */
        .report-page {
            background: white; width: 210mm; min-height: 297mm;
            padding: 20mm; margin: 20px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-size: 11pt; line-height: 1.5; color: black; page-break-after: always;
            position: relative;
        }
        .report-page table { border-spacing: 0; border-collapse: collapse; width: 100%; color: black; }
        .report-page td { padding-top: 2px; padding-bottom: 2px; vertical-align: top; }

        .sig-box { position: relative; height: 90px; width: 100%; display: flex; align-items: center; justify-content: center; }
        .ttd-img { max-height: 90px; max-width: 160px; object-fit: contain; pointer-events: none; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; }
            .no-print { display: none !important; }
            .report-page { margin: 0 !important; box-shadow: none !important; border: none; }
        }

        /* UI Styling */
        .input-group label { display: block; font-size: 0.7rem; font-weight: bold; color: #3b82f6; margin-bottom: 2px; text-transform: uppercase; }
        .input-group input, .input-group select { 
            width: 100%; background-color: #1e1e1e; border: 1px solid #333; color: #fff;
            padding: 8px; border-radius: 6px; font-size: 0.85rem; transition: all 0.3s;
        }
        .input-group input:focus { border-color: #3b82f6; outline: none; background-color: #252525; }
        .section-box { background: #1e1e1e; padding: 15px; rounded-xl; border: 1px solid #333; height: 100%; }
    </style>
</head>
<body>

<div class="no-print p-4 lg:p-8 max-w-[1600px] mx-auto">
    <div class="bg-[#181818] rounded-2xl p-6 shadow-2xl border-b-4 border-blue-600">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-white"><i class="fa-solid fa-file-invoice-dt mr-3 text-blue-500"></i>FORM 51 PPL MILENIAL</h1>
            <div class="flex gap-3 mt-4 md:mt-0">
                <button onclick="generateAI()" id="btn-ai" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-bold transition flex items-center">
                    <span id="loader" class="hidden mr-2">🌀</span> ✨ GENERATE NARASI AI
                </button>
                <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold shadow-lg">
                    <i class="fa-solid fa-print mr-2"></i> CETAK LAPORAN
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="section-box">
                <h3 class="text-blue-400 font-bold mb-4 flex items-center"><i class="fa-solid fa-id-badge mr-2"></i> DATA PENYULUH</h3>
                <div class="space-y-4">
                    <div class="input-group">
                        <label>Nama Lengkap</label>
                        <select id="in_nama" onchange="updateDataPenyuluh()">
                            <option value="">-- Pilih Nama --</option>
                            <option>ABDUL RAHMAN, SP</option><option>ANDI LUTHFIAH, SP</option>
                            <option>INDRA YULIANA, S.TP., M.Si.</option><option>NURUL FAHMI, S.P.</option>
                            <option>REZKI RAHAYU, S.P.</option><option>RIZAL SMITH ANUGRAH SYAM, S.P.</option>
                            <option>SUHADY HAMDAN, S.P.</option><option>SULFIANITA, S.P.</option><option>SURAHMAN, S.TP</option>
                        </select>
                    </div>
                    <div class="input-group"><label>NIP</label><input type="text" id="in_nip" readonly class="opacity-50 text-gray-400"></div>
                    <div class="input-group"><label>Pangkat / Golongan</label><input type="text" id="in_pangkat" oninput="updateLaporan()" value="Penata Muda, III/a"></div>
                    <div class="input-group"><label>Jabatan</label><input type="text" id="in_jabatan" oninput="updateLaporan()" value="Penyuluh Pertanian Ahli Pertama"></div>
                    <div class="input-group"><label>Wilayah BPP (Kecamatan)</label><input type="text" id="in_wilayah" oninput="updateLaporan()" placeholder="Cth: Bola"></div>
                    
                    <hr class="border-gray-700">
                    <div class="input-group"><label>Nama Koordinator</label><input type="text" id="in_nama_k" oninput="updateLaporan()" value="Nama Koordinator"></div>
                    <div class="input-group"><label>NIP Koordinator</label><input type="text" id="in_nip_k" oninput="updateLaporan()" value="19xxxxxxxxxxxxxx"></div>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="input-group"><label class="text-[10px]">TTD Penyuluh</label><input type="file" accept="image/*" onchange="readImage(this, 'ttd_p')"></div>
                        <div class="input-group"><label class="text-[10px]">TTD Koord</label><input type="file" accept="image/*" onchange="readImage(this, 'ttd_k')"></div>
                    </div>
                </div>
            </div>

            <script>
                for(let i=1; i<=3; i++){
                    document.write(`
                    <div class="section-box">
                        <h3 class="text-orange-400 font-bold mb-4 flex items-center"><i class="fa-solid fa-file-lines mr-2"></i> KEGIATAN ${i}</h3>
                        <div class="space-y-3">
                            <div class="input-group"><label>Materi</label><input type="text" id="materi_${i}" oninput="updateLaporan()" placeholder="Cth. Pengendalian Hama Penggerek Batang Padi"></div>
                            <div class="input-group">
                                <label>Metode</label>
                                <select id="metode_${i}" onchange="updateLaporan()">
                                    <option>Diskusi</option><option>Ceramah</option><option>Demonstrasi<option>Media cetak/Media Sosial</option>
                                    <option>Anjangsana</option><option>Temu Wicara</option>
                                </select>
                            </div>
                            <div class="input-group"><label>Lokasi / Kelompok</label><input type="text" id="lok_${i}" oninput="updateLaporan()" placeholder="Cth: Kelompok Tani Sukamaju"></div>
                            <div class="input-group"><label>Jumlah Peserta</label><input type="text" id="peserta_${i}" oninput="updateLaporan()" value="Cth. 15 Orang"></div>
                            <div class="input-group"><label>Tanggal</label><input type="date" id="tgl_${i}" onchange="updateLaporan()"></div>
                        </div>
                    </div>
                    `);
                }
            </script>
        </div>
        <textarea id="h_1" class="hidden"></textarea><textarea id="h_2" class="hidden"></textarea><textarea id="h_3" class="hidden"></textarea>
    </div>
</div>

<div id="report-container"></div>

<script>
    const dataPenyuluh = {
        "ABDUL RAHMAN, SP": "199009202020121001", "ANDI LUTHFIAH, SP": "199307162020122003",
        "INDRA YULIANA, S.TP., M.Si.": "199307062020122001", "NURUL FAHMI, S.P.": "198911142020122002",
        "REZKI RAHAYU, S.P.": "199507052020122003", "RIZAL SMITH ANUGRAH SYAM, S.P.": "199005152020121001",
        "SUHADY HAMDAN, S.P.": "199202072020121001", "SULFIANITA, S.P.": "199505082020122004", "SURAHMAN, S.TP": "199203122020121003"
    };

    let imgStore = { ttd_p: "", ttd_k: "" };

    function readImage(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { imgStore[type] = e.target.result; updateLaporan(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateDataPenyuluh() {
        const nama = document.getElementById("in_nama").value;
        document.getElementById("in_nip").value = dataPenyuluh[nama] || "";
        updateLaporan();
    }

    async function generateAI() {
        const btn = document.getElementById('btn-ai');
        const loader = document.getElementById('loader');
        const m1 = document.getElementById('materi_1').value;
        const m2 = document.getElementById('materi_2').value;
        const m3 = document.getElementById('materi_3').value;
        if(!m1 || !m2 || !m3) return alert("Mohon isi minimal semua materi di Panel!");
        
        btn.disabled = true; loader.classList.remove('hidden');
        const key = "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";
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile", 
                    messages: [{ role: "user", content: `Buat 3 narasi hasil kegiatan penyuluhan pertanian yang berbeda dalam bahasa Indonesia formal. Narasi 1: ${m1}, Narasi 2: ${m2}, Narasi 3: ${m3}. Pisahkan dengan tanda '###'.` }] 
                })
            });
            const data = await res.json();
            const parts = data.choices[0].message.content.split('###');
            document.getElementById('h_1').value = parts[0]?.trim();
            document.getElementById('h_2').value = parts[1]?.trim();
            document.getElementById('h_3').value = parts[2]?.trim();
            updateLaporan();
            alert("✅ Narasi 3 Laporan Berbeda Berhasil Dibuat!");
        } catch (e) { alert("Koneksi AI Terputus. Coba lagi."); }
        finally { btn.disabled = false; loader.classList.add('hidden'); }
    }

    function updateLaporan() {
        const container = document.getElementById('report-container');
        container.innerHTML = "";
        
        const nama = document.getElementById('in_nama').value || "..........................";
        const nip = document.getElementById('in_nip').value || "..........................";
        const pangkat = document.getElementById('in_pangkat').value || "..........................";
        const jabatan = document.getElementById('in_jabatan').value || "..........................";
        const wilayah = document.getElementById('in_wilayah').value || "........";
        
        // Data Koordinator manual
        const namaK = document.getElementById('in_nama_k').value || "..........................";
        const nipK = document.getElementById('in_nip_k').value || "..........................";

        for (let i = 1; i <= 3; i++) {
            const materi = document.getElementById(`materi_${i}`).value || "..........................";
            const metode = document.getElementById(`metode_${i}`).value || "..........................";
            const lok = document.getElementById(`lok_${i}`).value || "..........................";
            const pes = document.getElementById(`peserta_${i}`).value || "..........................";
            const tglRaw = document.getElementById(`tgl_${i}`).value;
            const tgl = tglRaw ? new Date(tglRaw).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) : "..........................";
            const hasil = document.getElementById(`h_${i}`).value || "(Klik tombol Generate AI untuk mengisi narasi hasil kegiatan secara otomatis)";

            container.innerHTML += `
                <div class="report-page">
                    <div class="text-center font-bold text-lg mb-8 uppercase underline">LAPORAN KEGIATAN DISEMINASI INFORMASI PERTANIAN</div>
                    <table>
                        <tr><td width="30" class="font-bold">1.</td><td colspan="2" class="font-bold">Penyuluh Pertanian</td></tr>
                        <tr><td></td><td width="180">a. Nama / NIP</td><td>: ${nama} / NIP. ${nip}</td></tr>
                        <tr><td></td><td>b. Pangkat / Golongan</td><td>: ${pangkat}</td></tr>
                        <tr><td></td><td>c. Jabatan</td><td>: ${jabatan}</td></tr>
                        <tr><td></td><td>d. Unit Kerja</td><td>: KEMENTERIAN PERTANIAN RI</td></tr>
                        <tr><td class="font-bold pt-4">2.</td><td class="font-bold pt-4">Dasar Pelaksanaan</td><td class="pt-4">: Indikator Kinerja Penyuluh Pertanian</td></tr>
                        <tr><td class="font-bold pt-2">3.</td><td class="font-bold pt-2">Materi Diseminasi</td><td class="pt-2">: <b>${materi}</b></td></tr>
                        <tr><td class="font-bold pt-2">4.</td><td colspan="2" class="font-bold pt-2">Pelaksanaan Kegiatan</td></tr>
                        <tr><td></td><td>a. Waktu</td><td>: ${tgl}</td></tr>
                        <tr><td></td><td>b. Tempat/Lokasi</td><td>: ${lok}</td></tr>
                        <tr><td></td><td>c. Metode</td><td>: ${metode}</td></tr>
                        <tr><td></td><td>d. Peserta</td><td>: ${pes}</td></tr>
                        <tr><td class="font-bold pt-6">5.</td><td class="font-bold pt-6">Hasil Kegiatan</td><td class="pt-6 text-justify leading-relaxed">${hasil}</td></tr>
                    </table>

                    <div class="flex justify-between mt-24 px-10">
                        <div class="text-center w-[45%]">
                            Mengetahui,<br>Koordinator BPP ${wilayah}
                            <div class="sig-box">${imgStore.ttd_k ? `<img src="${imgStore.ttd_k}" class="ttd-img">` : ''}</div>
                            <b class="underline">${namaK}</b><br>NIP. ${nipK}
                        </div>
                        <div class="text-center w-[45%]">
                            Bola, ${tgl}<br>Penyuluh Pertanian
                            <div class="sig-box">${imgStore.ttd_p ? `<img src="${imgStore.ttd_p}" class="ttd-img">` : ''}</div>
                            <b class="underline">${nama}</b><br>NIP. ${nip}
                        </div>
                    </div>
                </div>
            `;
        }
    }
    window.onload = updateLaporan;
</script>
</body>
</html>
