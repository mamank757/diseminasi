    /* Animasi putar untuk ikon loader */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.animate-spin-custom {
    display: inline-block;
    animation: spin 1s linear infinite;
}

/* Efek berdenyut untuk tombol saat loading */
.pulse-loading {
    animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    opacity: 0.8;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
}

/* --- Tambahkan ini di bagian CSS umum (di atas @media print) --- */
.signature-wrapper {
    page-break-inside: avoid;
    break-inside: avoid;
    display: block;

}

/* --- Gabungkan/Ganti @media print Anda dengan ini --- */
@media print {
    @page { 
        size: A4; 
        margin: 20mm; 
    }
    body { background: white !important; }
    .no-print { display: none !important; }
    
    #report-container {

    .report-page { 
        margin: 0 !important;

        border: none;

        page-break-inside: auto; /* Biarkan teks panjang terputus ke hal berikutnya */

    /* Mencegah tabel terpotong di tengah baris */
    table, tr, td {

    }

    /* KUNCI UTAMA: Memaksa tanda tangan tetap satu kesatuan */
    .signature-wrapper {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        margin-top: 20px; /* Jarak aman sebelum tanda tangan */

}

<script>
    // 1. Inisialisasi Data & Variabel Global
    const blacklistNIP = ["199409042020122001", "19940904 202012 2 001"];
    let jumlahKegiatan = 1;
    let imgStore = { ttd_p: "", ttd_k: "" };
    
    const dataPenyuluh = {
        "A. FATHUR MUH. ISHAQ B, S.ST., M.Si": { nip: "199604112020121001" },
        "ANDI LUTHFIAH, SP": { nip: "199307162020122003" },
        "INDRA YULIANA, S.TP., M.Si.": { nip: "199307062020122001" },
        "MIFTAHUL KHAIR, S.P.": { nip: "199311192020122003" },
        "NURUL FAHMI, S.P.": { nip: "198911142020122002" },
        "REZKI RAHAYU, S.P.": { nip: "199507052020122003" },
        "RIZAL SMITH ANUGRAH SYAM, S.P.": { nip: "199005152020121001" },
        "SUHADY HAMDAN, S.P.": { nip: "199202072020121001" },
        "SULFIANITA, S.P.": { nip: "199505082020122004" },
        "SURAHMAN, S.TP": { nip: "199203122020121003" },
        "UMAR, SP": { nip: "199408272020121001" }
    };

    // 2. Fungsi Utama Window Onload
    window.onload = function() {

    // 3. Fungsi Kendali UI
    function closeWarning() {
        const warningDiv = document.getElementById('browser-warning');
        if (warningDiv) {
            warningDiv.style.display = 'none';
            document.body.style.overflow = 'auto';

    function safePrint() {
        const userNIP = document.getElementById('in_nip').value.trim();
        if (!userNIP) {
            alert("Silakan isi NIP terlebih dahulu sebelum mencetak.");
            return;
        }
        if (blacklistNIP.includes(userNIP)) {
            alert("❌ AKSES ANDA DITOLAK!");
            return;
        }
        window.print();
    }

    function updateDataPenyuluh() {
        const namaInput = document.getElementById("in_nama").value;
        const data = dataPenyuluh[namaInput];
        if (data) {
            document.getElementById("in_nip").value = data.nip;
            if(data.pangkat) document.getElementById("in_pangkat").value = data.pangkat;
            if(data.jabatan) document.getElementById("in_jabatan").value = data.jabatan;
        }
        updateLaporan();
    }

    // 4. Fungsi Form Kegiatan
    function renderInputKegiatan() {
        const container = document.getElementById('input-kegiatan-container');
        let currentValues = [];
        for(let i=1; i<=20; i++){
            if(document.getElementById(`materi_${i}`)){
                currentValues[i] = {
                    materi: document.getElementById(`materi_${i}`).value,
                    metode: document.getElementById(`metode_${i}`).value,
                    lok: document.getElementById(`lok_${i}`).value,
                    peserta: document.getElementById(`peserta_${i}`).value,
                    tgl: document.getElementById(`tgl_${i}`).value,
                    hasil: document.getElementById(`h_${i}`).value
                };
            }
        }

        let html = '';
        for(let i=1; i<=jumlahKegiatan; i++){
            const val = currentValues[i] || {materi:'', metode:'Diskusi', lok:'', peserta:'15 Orang', tgl:'', hasil:''};
            html += `
            <div class="section-box relative">
                <button onclick="hapusKegiatan(${i})" class="absolute top-2 right-2 text-red-500 hover:text-red-700 ${jumlahKegiatan === 1 ? 'hidden' : ''}">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
                <h3 class="text-orange-400 font-bold mb-4 flex items-center"><i class="fa-solid fa-file-lines mr-2"></i> KEGIATAN ${i}</h3>
                <div class="space-y-3">
                    <div class="input-group"><label>Materi</label><input type="text" id="materi_${i}" oninput="updateLaporan()" value="${val.materi}" placeholder="Cth: Budidaya Jagung"></div>
                    <div class="input-group">
                        <label>Metode</label>
                        <select id="metode_${i}" onchange="updateLaporan()">
                            <option ${val.metode=='Diskusi'?'selected':''}>Diskusi</option>
                            <option ${val.metode=='Ceramah'?'selected':''}>Ceramah</option>
                            <option ${val.metode=='Demonstrasi'?'selected':''}>Demonstrasi</option>
                            <option ${val.metode=='Media cetak/Media Sosial'?'selected':''}>Media cetak/Media Sosial</option>
                            <option ${val.metode=='Anjangsana'?'selected':''}>Anjangsana</option>
                            <option ${val.metode=='Temu Wicara'?'selected':''}>Temu Wicara</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Lokasi / Kelompok</label><input type="text" id="lok_${i}" oninput="updateLaporan()" value="${val.lok}"></div>
                    <div class="input-group"><label>Jumlah Peserta</label><input type="text" id="peserta_${i}" oninput="updateLaporan()" value="${val.peserta}"></div>
                    <div class="input-group"><label>Tanggal Kegiatan</label><input type="date" id="tgl_${i}" onchange="updateLaporan()" value="${val.tgl}"></div>
                    <div class="input-group">
                        <label class="text-yellow-400">Foto Kegiatan (Wajib)</label>
                        <input type="file" accept="image/*" onchange="readImage(this, 'foto_${i}')">
                    </div>
                    <textarea id="h_${i}" class="hidden">${val.hasil}</textarea>
                </div>
            </div>`;
        }
        container.innerHTML = html;
        updateLaporan();
    }

    function tambahKegiatan() {
        if(jumlahKegiatan < 20) {
            jumlahKegiatan++;
            renderInputKegiatan();
        }
    }

    function hapusKegiatan(index) {
        if(jumlahKegiatan > 1) {
            jumlahKegiatan--;
            renderInputKegiatan();
        }
    }

    function readImage(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { imgStore[type] = e.target.result; updateLaporan(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function generateAI() {
        const userNIP = document.getElementById('in_nip').value.trim();
        if (blacklistNIP.includes(userNIP)) {
            alert("Akses Ditolak! Anda tidak diizinkan oleh Admin.");
            return;
        }
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzG3xe7StqwkdZr0Ucyz5BEjTzhfv9b5eN19B7rFKhNWln3YShtRgOHSTK_KBPjA8rCIg/exec"; 
        const btn = document.getElementById('btn-ai');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        let promptMateri = "";
        
        for(let i=1; i<=jumlahKegiatan; i++){
            const m = document.getElementById(`materi_${i}`).value;
            if(!m) return alert(`Isi materi kegiatan ${i} terlebih dahulu!`);
            promptMateri += `Materi ${i}: ${m}, `;
        }

        btn.disabled = true; 
        loader.classList.remove('hidden');
        btn.classList.add('pulse-loading'); 
        btnText.innerText = "SEDANG MENYUSUN NARASI..."; 

        const promptUser = `Buatlah ${jumlahKegiatan} narasi hasil kegiatan penyuluhan pertanian. Materi: ${promptMateri}. Formal, teknis, 2 kalimat panjang per narasi. Pisahkan dengan '###'.`;

        try {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ prompt: promptUser })
            });
            const data = await res.json();
            const aiResponse = data.choices[0].message.content;
            const parts = aiResponse.split('###');

            for(let i=1; i<=jumlahKegiatan; i++){
                document.getElementById(`h_${i}`).value = parts[i-1]?.trim() || "Gagal generate.";
            }
            updateLaporan();
            alert("✅ Berhasil menyusun narasi.");
        } catch (e) { 
            console.error(e);
            alert("Gagal Generate AI. Coba lagi nanti."); 
        } finally {
            btn.disabled = false;
            loader.classList.add('hidden');
            btn.classList.remove('pulse-loading'); 
            btnText.innerText = "✨ GENERATE NARASI AI"; 
        }
    }

    // 6. Fungsi Update Tampilan Laporan
    function updateLaporan() {

        const nama = document.getElementById('in_nama').value || "..........................";

        const tglTTDRaw = document.getElementById('in_tgl_ttd').value;
        const tglTTD = tglTTDRaw ? new Date(tglTTDRaw).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) : "..........................";

        const namaK = document.getElementById('in_nama_k').value || "..........................";
        const nipK = document.getElementById('in_nip_k').value || "..........................";

        for (let i = 1; i <= jumlahKegiatan; i++) {
            const materi = document.getElementById(`materi_${i}`)?.value || "..........................";
            const metode = document.getElementById(`metode_${i}`)?.value || "..........................";
            const lok = document.getElementById(`lok_${i}`)?.value || "..........................";
            const pes = document.getElementById(`peserta_${i}`)?.value || "..........................";
            
            // Tanggal Kegiatan
            const tglRaw = document.getElementById(`tgl_${i}`)?.value;
            const tglKegiatan = tglRaw ? new Date(tglRaw).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) : "..........................";
            
            const hasil = document.getElementById(`h_${i}`)?.value || "(Klik tombol Generate AI)";
            const fotoKegiatan = imgStore[`foto_${i}`];

            container.innerHTML += `
                <div class="report-page">
                    <div class="text-center font-bold text-lg mb-8 uppercase underline">LAPORAN KEGIATAN DISEMINASI INFORMASI PERTANIAN</div>
                    <table>
                        <tr><td width="30" class="font-bold">1.</td><td colspan="2" class="font-bold">Penyuluh Pertanian</td></tr>
                        <tr><td></td><td width="180">a. Nama / NIP</td><td>: ${nama} / NIP. ${nip}</td></tr>
                        <tr><td></td><td>b. Pangkat / Golongan</td><td>: ${pangkat}</td></tr>
                        <tr><td></td><td>c. Jabatan</td><td>: ${jabatan}</td></tr>
                        <tr><td></td><td>d. Unit Kerja</td><td>: KEMENTERIAN PERTANIAN RI</td></tr>
                        <tr><td class="font-bold pt-4">2.</td><td class="font-bold pt-4">Dasar Pelaksanaan</td><td class="pt-4">: Indikator Kinerja Penyuluh Pertanian</td></tr>
                        <tr><td class="font-bold pt-2">3.</td><td class="font-bold pt-2">Materi Diseminasi</td><td class="pt-2">: <b>${materi}</b></td></tr>
                        <tr><td class="font-bold pt-2">4.</td><td colspan="2" class="font-bold pt-2">Pelaksanaan Kegiatan</td></tr>
                        <tr><td></td><td>a. Waktu</td><td>: ${tglKegiatan}</td></tr>
                        <tr><td></td><td>b. Tempat/Lokasi</td><td>: ${lok}</td></tr>
                        <tr><td></td><td>c. Metode</td><td>: ${metode}</td></tr>
                        <tr><td></td><td>d. Peserta</td><td>: ${pes}</td></tr>
                        <tr><td class="font-bold pt-6">5.</td><td class="font-bold pt-6">Hasil Kegiatan</td><td class="pt-6 text-justify leading-relaxed">${hasil}</td></tr>
                    </table>

                    <div class="photo-container">
                        ${fotoKegiatan ? `<img src="${fotoKegiatan}" class="photo-img">` : '<div class="h-20 flex items-center justify-center border-dashed border-2 border-gray-300 text-gray-400 text-sm">Foto belum diunggah</div>'}
                    </div>

                    <div class="signature-wrapper">
                        <div class="flex justify-between mt-10 px-10">
                            <div class="text-center w-[45%]">
                                Mengetahui,<br>${labelK} ${wilayah}
                                <div class="sig-box">${imgStore.ttd_k ? `<img src="${imgStore.ttd_k}" class="ttd-img">` : ''}</div>
                                <b class="underline uppercase">${namaK}</b><br>NIP. ${nipK}
                            </div>
                            <div class="text-center w-[45%]">
                                ${wilayah}, ${tglTTD}<br>Penyuluh Pertanian
                                <div class="sig-box">${imgStore.ttd_p ? `<img src="${imgStore.ttd_p}" class="ttd-img">` : ''}</div>
                                <b class="underline uppercase">${nama}</b><br>NIP. ${nip}
                            </div>
                        </div>
                    </div>
                </div>`;
        }
    }
</script>
</body>
</html>
